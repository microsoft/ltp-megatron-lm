name: Unit Tests

on:
  push:
    branches:
    - dev
    - canary/*
    - release/*
  pull_request:
    branches:
    - dev
    - canary/*
    - release/*
  release:
    types:
    - published

jobs:
  unit-tests-single-node:
    name: Unit Tests (Single-node)
    runs-on: unit-tests
    timeout-minutes: 3600
    permissions:
      contents: read
    strategy:
      fail-fast: true
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v3
      - name: Create tar.gz for target branch
        run: |
          touch ltp-megatron-lm.tar.gz
          tar --exclude='ltp-megatron-lm.tar.gz' -czf ltp-megatron-lm.tar.gz .
      - name: Upload tar.gz for target branch
        run: |
          ${AZCOPY_PATH} ltp-megatron-lm.tar.gz ${AZURE_BLOB_CODE_TAR_URL}
      - name: Submit test job
        run: |
          export LTP_JOB_YAML_PATH=${LTP_JOB_UNIT_TESTS_SINGLE_NODE_YAML_PATH}
          python ${LTP_SUBMIT_TEST_JOB_PY_PATH}
      - name: Wait test job
        run: |
          python ${LTP_WAIT_TEST_JOB_PY_PATH}
