name: Model Test

on:
  push:
    branches:
    - dev
    - canary/*
    - release/*
  pull_request:
    branches:
    - dev
    - canary/*
    - release/*
  release:
    types:
    - published

jobs:
  model-test:
    name: Model Test
    runs-on: model-test
    timeout-minutes: 3600
    permissions:
      contents: read
    strategy:
      fail-fast: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: List Repo
        run: |
          ls .
      - name: List Home
        run: |
          echo ${HOME}
